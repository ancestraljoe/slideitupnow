<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SlideItUpNow</title>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
        <script type="module" src="script.js"></script>
        <script src="tooltip.js"></script>
        <link href="style.css" rel="stylesheet">
        <link href="tooltip.css" rel="stylesheet">
    </head>
    <body>
        <!-- Menu Toolbar (auto-hide) -->
        <div id="menu-toolbar" class="hidden">
            <button class="toolbar-btn" id="settings"><span class="btn-icon">&#9881;</span><span class="btn-label">Settings</span></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" id="volume"><span class="btn-icon">&#128264;</span><span class="btn-label">Volume</span></button>
            <input type="range" id="volumeRange" min="0" max="100" value="100">
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" id="pauseAll"><span class="btn-icon">&#9208;</span><span class="btn-label">Pause</span></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" id="fullscreen"><span class="btn-icon">&#9974;</span><span class="btn-label">Fullscreen</span></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" id="backHome"><span class="btn-icon">&#8962;</span><span class="btn-label">Home</span></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" id="themeToggle"><span class="btn-icon">&#9789;</span><span class="btn-label">Theme</span></button>
        </div>

        <!-- Settings Modal -->
        <div id="settingsOverlay">
            <div id="settingsDialog">
                <div class="settings-header">
                    <h2>Settings</h2>
                    <button class="settings-close" id="settingsClose">&times;</button>
                </div>
                <div class="settings-body">
                    <!-- Display -->
                    <div class="settings-section">
                        <p class="settings-section-title">Display</p>
                        <div class="settings-group">
                            <div class="settings-row">
                                <label for="rows">Rows</label>
                                <input type="number" value="2" id="rows" min="1" max="10" autocomplete="off">
                            </div>
                            <div class="settings-row">
                                <label for="nextImageSec">Image interval (sec)</label>
                                <input type="number" value="20" id="nextImageSec" min="1" autocomplete="off">
                            </div>
                        </div>
                    </div>

                    <!-- Background -->
                    <div class="settings-section">
                        <p class="settings-section-title">Background</p>
                        <div class="settings-group">
                            <div class="settings-row">
                                <label for="backgroundColor">Color (hex)</label>
                                <input type="text" value="0a0a0b" id="backgroundColor" autocomplete="off">
                            </div>
                            <div class="settings-row">
                                <label for="backgroundImage">Image</label>
                                <input type="file" accept=".png,.svg,.jpg,.gif,.webp" id="backgroundImage" autocomplete="off">
                            </div>
                            <div class="settings-row">
                                <label>Fit mode</label>
                                <div class="segmented-control">
                                    <input type="radio" id="fit" name="imageMode" autocomplete="off">
                                    <label for="fit">Fit</label>
                                    <input type="radio" id="fill" name="imageMode" checked autocomplete="off">
                                    <label for="fill">Fill</label>
                                </div>
                            </div>
                            <div class="settings-row">
                                <label>Clear image</label>
                                <button class="btn-small" id="clearBackgroundImage">Clear</button>
                            </div>
                        </div>
                    </div>

                    <!-- Video -->
                    <div class="settings-section">
                        <p class="settings-section-title">Video</p>
                        <div class="settings-group">
                            <div class="settings-row">
                                <label for="videoSplitLength">Split length (sec)</label>
                                <input type="number" value="60" id="videoSplitLength" min="10" autocomplete="off">
                            </div>
                        </div>
                    </div>

                    <!-- Theme -->
                    <div class="settings-section">
                        <p class="settings-section-title">Theme</p>
                        <div class="theme-toggle-group">
                            <button class="theme-option active" id="themeDark" data-theme-value="dark">&#9789; Dark</button>
                            <button class="theme-option" id="themeLight" data-theme-value="light">&#9788; Light</button>
                        </div>
                    </div>

                    <button id="settingsApply">Save &amp; Apply</button>
                </div>
            </div>
        </div>

        <!-- Welcome Screen -->
        <div id="welcome">
            <div id="welcomeArea">
                <div id="load-container">
                    <div class="spinner"></div>
                    <p id="load-text">Loading files...</p>
                </div>
                <h1 class="titleContent">SlideItUpNow</h1>
                <p class="titleContent subtitle">Tiled slideshow for your content</p>
                <div class="titleContent source-cards noForm">
                    <button class="source-card" id="browse">
                        <span class="card-icon">&#128193;</span>
                        <div class="card-title">Local Files</div>
                        <div class="card-desc">Pick a folder from your computer</div>
                    </button>
                    <button class="source-card" id="browseReddit">
                        <span class="card-icon">&#128279;</span>
                        <div class="card-title">Reddit</div>
                        <div class="card-desc">Browse subreddit content</div>
                    </button>
                </div>
                <p class="titleContent privacy-note noForm">Runs entirely in your browser. No files uploaded.</p>
                <div id="redditForm" style="display: none;">
                    <button class="form-back" id="redditBack">&#8592; Back</button>
                    <h2>Reddit Browser</h2>
                    <div>
                        <label>Profile</label>
                        <select id="profilePicker">
                            <option value="__none" selected>Select...</option>
                            <option value="__create">+ New Profile</option>
                            <optgroup label="Presets"></optgroup>
                            <optgroup label="Custom"></optgroup>
                        </select>
                    </div>
                    <div id="profileInput" style="display: none;">
                        <label>Name</label>
                        <input type="text" id="profileNameInput" autocomplete="off" value="">
                    </div>
                    <div>
                        <label>Sort</label>
                        <select id="redditSort" autocomplete="off">
                            <option value="hot" selected>Hot</option>
                            <option value="rising">Rising</option>
                            <option value="top">Top</option>
                            <option value="controversial">Controversial</option>
                        </select>
                    </div>
                    <div style="display: none;" id="redditTimeContainer">
                        <label>Time range</label>
                        <select id="redditTime" autocomplete="off">
                            <option value="hour">Past hour</option>
                            <option value="day" selected>Past 24 hours</option>
                            <option value="week">Past week</option>
                            <option value="month">Past month</option>
                            <option value="year">Past year</option>
                            <option value="all">All time</option>
                        </select>
                    </div>
                    <div>
                        <label>Subreddits</label>
                        <span><input type="text" placeholder="subreddit" id="subredditInput" autocomplete="off"><button id="subredditAdd">Add</button></span>
                    </div>
                    <div id="subredditError" style="display: none;"></div>
                    <div>
                        <span></span><span id="pickedSubreddits"></span>
                    </div>
                    <div>
                        <div class="tooltip-container">
                            <label for="roundRobin" class="tooltip-target">Round Robin (?)</label>
                            <div class="tooltip">
                                Instead of mixing all subreddits together,
                                this takes one slide from each subreddit at a time.
                            </div>
                        </div>
                        <input type="checkbox" autocomplete="off" id="roundRobin">
                    </div>
                    <div>
                        <button id="redditSubmit">Start Slideshow</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slideshow Grid -->
        <div id="slideshow-grid">
            <div class="slideshow-row"></div>
        </div>
    </body>
</html>
